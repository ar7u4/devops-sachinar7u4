name: 'Python QA Composite Action'
description: 'Sets up Python environment, handles pip caching, installs dependencies, and runs Flake8 and Pytest checks.'
inputs:
  python-version:
    description: 'Python version to set up'
    required: false
    default: '3.11'
  cache-dependency-path:
    description: 'Path to dependency file for caching'
    required: false
    default: 'requirements-dev.txt'
  run-lint:
    description: 'Whether to run Flake8 linting checks'
    required: false
    default: 'true'
  run-tests:
    description: 'Whether to run Pytest unit tests'
    required: false
    default: 'true'
outputs:
  lint-status:
    description: 'Result of the lint step'
    value: ${{ steps.lint-run.outputs.status || 'skipped' }}
  test-status:
    description: 'Result of the test step'
    value: ${{ steps.test-run.outputs.status || 'skipped' }}

runs:
  using: 'composite'
  steps:
    - name: Setup Python environment
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Install dependencies
      shell: bash
      run: |
        echo "Updating pip and installing dependencies..."
        python -m pip install --upgrade pip
        if [ -f "${{ inputs.cache-dependency-path }}" ]; then
          python -m pip install -r ${{ inputs.cache-dependency-path }}
        else
          echo "Warning: ${{ inputs.cache-dependency-path }} not found. Installing base runner packages."
          python -m pip install pytest flake8
        fi

    - name: Run Flake8 linter
      id: lint-run
      if: ${{ inputs.run-lint == 'true' }}
      shell: bash
      run: |
        echo "Running flake8 linter..."
        # Stop build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. Clean run logic.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        echo "status=passed" >> $GITHUB_OUTPUT

    - name: Run Pytest unit tests
      id: test-run
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: |
        echo "Running pytest unit tests..."
        pytest
        echo "status=passed" >> $GITHUB_OUTPUT
