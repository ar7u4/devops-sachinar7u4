name: 05-Job-Dependencies
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - run: ech "Running Code Linter..."

  build:
    runs-on: ubuntu-latest
    needs: lint # This job won't start until 'lint' succeeds
    steps:
      - run: echo "Compiling Code..."

  test:
    runs-on: ubuntu-latest
    needs: build # This job won't start until 'build' succeeds
    steps:
      - run: echo "Running Integration Tests..."
