name: 08-Secrets-And-Environments
on:
  workflow_dispatch: # Best tested manually

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production # Links this job to a specific GitHub Environment

    steps:
      - name: Deploying to Production Server
        env:
          API_KEY: ${{ secrets.PRODUCTION_API_KEY }} # Pulled securely from GitHub Secrets
          # API_KEY: 13456 # Pulled securely from GitHub Secrets
        run: |
          echo "Connecting to production server..."
          # GitHub will automatically mask secrets in logs (e.g., ***)
          echo "Using API Key: $API_KEY"
