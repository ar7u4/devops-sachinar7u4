name: 07-Artifact-Sharing
on: [push]

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Create Dummy Asset
        run: |
          mkdir dist
          echo "<html><body>Hello Production!</body></html>" > dist/index.html
      # - name: Upload Build Folder
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: production-build
      #     path: dist/

  deploy-assets:
    runs-on: ubuntu-latest
    needs: build-assets
    steps:
      - name: Download Build Folder
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: ready-to-deploy/

      - name: Verify Files
        run: ls -la ready-to-deploy/
